name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-viewer/package-lock.json

      - name: Install dependencies
        run: cd docs-viewer && npm ci

      - name: Build
        run: cd docs-viewer && npm run build

      - name: Copy docs to dist
        run: |
          cp -r architecture docs-viewer/dist/
          cp -r api docs-viewer/dist/
          cp -r deployment docs-viewer/dist/
          cp -r user docs-viewer/dist/
          cp README.md docs-viewer/dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-viewer/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
